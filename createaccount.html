<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KasbCars || سيارات قصب</title>
    <link
      rel="shortcut icon"
      href="src/imgs/kasbcarslogo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="css/create.css" />
  </head>
  <body>
    <div class="signup-box">
      <h1 class="title-brand">kasb <span>car</span></h1>
      <h2>إنشاء حساب</h2>

      <div class="input-group">
        <label for="fullname">الاسم بالكامل</label>
        <input type="text" id="fullname" placeholder="الاسم بالكامل" required />
        <small class="error-message-create" id="fullname-error"></small>
      </div>

      <div class="input-group">
        <label for="email">البريد الإلكتروني</label>
        <input
          type="email"
          id="email-create"
          placeholder="البريد الإلكتروني"
          required
        />
        <small class="error-message-create" id="email-create-error"></small>
      </div>

      <div class="input-group">
        <label for="password">كلمة المرور</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password-create"
            placeholder="كلمة المرور"
            maxlength="15"
            required
          />

          <iconify-icon
            icon="mdi:hide"
            width="24"
            id="hide-pass"
            class="toggle-password-create"
          ></iconify-icon>

          <iconify-icon
            icon="mdi:eye"
            width="24"
            id="show-pass"
            class="toggle-password-eye-create visibility"
          ></iconify-icon>
        </div>
        <small class="error-message-create" id="password-create-error"></small>
      </div>

      <div class="input-group">
        <label for="confirmPassword">تأكيد كلمة المرور</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="confirmPassword"
            placeholder="تأكيد كلمة المرور"
            maxlength="15"
            required
          />

          <iconify-icon
            icon="mdi:hide"
            width="24"
            id="hide-confirm"
            class="toggle-password-create"
          ></iconify-icon>

          <iconify-icon
            icon="mdi:eye"
            width="24"
            id="show-confirm"
            class="toggle-password-eye-create visibility"
          ></iconify-icon>
        </div>
        <small class="error-message-create" id="confirmPassword-error"></small>
      </div>
      <button class="signup-btn" id="sign-up-create">إنشاء حساب</button>

      <div class="links">
        <p>عندك حساب بالفعل؟</p>
        <a href="#" id="pageloginAccount">تسجيل الدخول</a>
      </div>
    </div>
    <script src="js/create.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  </body>
</html>
