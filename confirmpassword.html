<!doctype html>
<html lang="en" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KasbCars || سيارات قصب</title>
    <link
      rel="shortcut icon"
      href="src/imgs/kasbcarslogo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="css/conpass.css" />
  </head>
  <body>
    <div class="reset-box">
      <h1 class="title-brand">kasb <span>car</span></h1>
      <h2>إعادة تعيين كلمة المرور</h2>

      <div class="input-group">
        <label for="newPassword">كلمة المرور الجديدة</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="newPassword"
            placeholder="كلمة المرور الجديدة"
            required
            maxlength="15"
          />

          <!-- hide -->
          <iconify-icon
            icon="mdi:hide"
            width="22"
            id="hide-new"
            class="toggle-icon"
          ></iconify-icon>

          <!-- show -->
          <iconify-icon
            icon="mdi:eye"
            width="22"
            id="show-new"
            class="toggle-icon visibility"
          ></iconify-icon>
        </div>
        <small class="error-message" id="newPassword-error"></small>
      </div>

      <div class="input-group">
        <label for="confirmPassword">تأكيد كلمة المرور</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="confirmPassword"
            placeholder="تأكيد كلمة المرور"
            required
            maxlength="15"
          />

          <!-- hide -->
          <iconify-icon
            icon="mdi:hide"
            width="22"
            id="hide-confirm"
            class="toggle-icon"
          ></iconify-icon>

          <!-- show -->
          <iconify-icon
            icon="mdi:eye"
            width="22"
            id="show-confirm"
            class="toggle-icon visibility"
          ></iconify-icon>
        </div>
        <small class="error-message" id="confirmPassword-error"></small>
      </div>
      <button class="reset-btn">تأكيد</button>

      <div id="msg" class="message"></div>
    </div>
    <script src="js/confirmpass.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  </body>
</html>
