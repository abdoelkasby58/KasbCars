<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KasbCars || سيارات قصب</title>
    <link
      rel="shortcut icon"
      href="src/imgs/kasbcarslogo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="css/forg.css" />
  </head>
  <body>
    <div class="forgot-box">
      <h1 class="title-brand">kasb <span>car</span></h1>
      <h2>نسيت كلمة المرور؟</h2>
      <p>اكتب بريدك الإلكتروني وهنبعتلك رابط استرجاع</p>
      <div class="input-group">
        <label for="email">البريد الإلكتروني</label>

        <input
          type="email"
          id="forget-email"
          placeholder="أدخل البريد الإلكتروني"
          required
        />

        <small class="error-message" id="forget-email-error"></small>
      </div>

      <button class="send-btn" id="btnemailforget">إرسال</button>

      <div class="links">
        <a href="#" id="backpageLogin">رجوع لتسجيل الدخول</a>
        <a href="#" id="pageCreateAccount">إنشاء حساب جديد</a>
      </div>
    </div>
    <script src="js/forget.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  </body>
</html>
